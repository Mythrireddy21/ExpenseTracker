<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Edit Profile - Expense Tracker</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<header>
  <h1>Edit Profile</h1>
  <nav>
    <ul class="nav-bar">
      <li><a href="{{ url_for('home') }}">Home</a></li>
      <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
      <li><a href="{{ url_for('add_expense') }}">Add Expense</a></li>
      <li><a href="{{ url_for('edit_profile') }}">Edit Profile</a></li>
      <li><a href="{{ url_for('graphs') }}">Generate Graphs</a></li>
      <li><a href="{{ url_for('logout') }}">Logout</a></li>
    </ul>
  </nav>
</header>

<main class="centered-container">
  <h2>Edit Your Profile</h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
          <div class="flash {{category}}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form action="{{ url_for('edit_profile') }}" method="post" class="form-box">
    <label for="email">Email</label>
    <input type="email" name="email" id="email" value="{{ user.email }}" required autocomplete="off" />
    
    <label for="password">New Password</label>
    <input type="password" name="password" id="password" placeholder="Leave blank to keep current password" />
    
    <label for="confirm_password">Confirm New Password</label>
    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm new password" />
    
    <button type="submit" class="btn btn-primary">Save Changes</button>
  </form>
</main>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
