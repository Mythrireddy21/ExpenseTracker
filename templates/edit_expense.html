<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Expense - Expense Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header>
    <h1>Edit Expense</h1>
    <nav>
      <ul class="nav-bar">
        <li><a href="{{ url_for('home') }}">Home</a></li>
        <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
        <li><a href="{{ url_for('add_expense') }}">Add Expense</a></li>
        <li><a href="{{ url_for('graphs') }}">Generate Graphs</a></li>
        <li><a href="{{ url_for('edit_profile') }}">Edit Profile</a></li>
        <li><a href="{{ url_for('logout') }}">Logout</a></li>
      </ul>
    </nav>
  </header>

  <main class="centered-container">
    {% if expense %}
    <div class="form-box">
      <form action="{{ url_for('edit_expense', index=index) }}" method="post">

        <label for="date">Date</label>
        <input type="date" id="date" name="date" value="{{ expense['date'] }}" required />

        <label for="amount">Amount</label>
        <input type="number" id="amount" name="amount" step="0.01" value="{{ expense['amount'] }}" required />

        <label for="currency">Currency</label>
        <select name="currency" id="currency" required>
          {% set selected_currency = expense['currency'] %}
          {% for code in ['USD', 'EUR', 'INR', 'GBP', 'JPY'] %}
            <option value="{{ code }}" {% if selected_currency == code %}selected{% endif %}>{{ code }}</option>
          {% endfor %}
        </select>

        <label for="category">Category</label>
        <input type="text" id="category" name="category" value="{{ expense['category'] }}" placeholder="e.g., Food, Transport" required />

        <label for="description">Description</label>
        <input type="text" id="description" name="description" value="{{ expense['description'] }}" placeholder="Optional description" required />

        <button type="submit" class="btn btn-primary">Update Expense</button>
      </form>
    </div>
    {% else %}
      <p class="error-text">Expense not found.</p>
    {% endif %}
  </main>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
